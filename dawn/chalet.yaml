name: oflibs
version: "1.0"
externalDependencies:
  dawn:
    repository: https://github.com/google/dawn.git
    commit: "2529dfe8b6af"
    kind: git

targets:
  dawn:
    kind: cmakeProject
    location: ${external:${name}}
    recheck: false
    rebuild: false
    install: true
    defines:
      - CMAKE_INSTALL_INCLUDEDIR=include
      - CMAKE_INSTALL_PREFIX=install
      - CMAKE_INSTALL_LIBDIR=lib
      - BUILD_SHARED_LIBS=OFF
      - CMAKE_BUILD_TYPE=Release

      # ── MSVC runtime: static, and it must reach the SUBPROJECTS too ──
      # CMAKE_MSVC_RUNTIME_LIBRARY alone is not enough. It is only honoured
      # under policy CMP0091=NEW, and subprojects that call
      # cmake_minimum_required() themselves (abseil, SPIRV-Tools) reset policies
      # to OLD in their own scope — there the variable goes inert and they fall
      # back to the /MD default while Dawn's own targets get /MT. That shipped a
      # webgpu_dawn.lib with BOTH runtimes inside it, which links into neither a
      # /MT nor a /MD consumer (LNK2038, in opposite directions, on disjoint
      # halves of the archive). CMAKE_POLICY_DEFAULT_CMP0091 sets the policy
      # default for every subproject regardless of what it requests.
      - CMAKE_POLICY_DEFAULT_CMP0091=NEW
      - CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      # Fetch Dawn's third-party deps via its python script
      - DAWN_FETCH_DEPENDENCIES=ON
      - DAWN_ENABLE_INSTALL=ON
      - TINT_ENABLE_INSTALL=OFF
      - DAWN_BUILD_MONOLITHIC_LIBRARY=STATIC

      # ── Trim build surface: no samples/tests/tools/protobuf ──
      - DAWN_BUILD_SAMPLES=OFF
      - DAWN_BUILD_TESTS=OFF
      - TINT_BUILD_TESTS=OFF
      - TINT_BUILD_CMD_TOOLS=OFF
      - TINT_BUILD_FUZZER=OFF
      - DAWN_BUILD_PROTOBUF=OFF

      # ── Disable wire/serialization (browser IPC only) ──
      - DAWN_ENABLE_WIRE=OFF

      # ── Disable null backend (only for testing) ──
      - DAWN_ENABLE_NULL=OFF

      # openFrameworks owns the window/surface
      - DAWN_USE_GLFW=OFF

      # ── Aggressive backend gating per platform ──
    defines[platform:macos]:
      - DAWN_ENABLE_METAL=ON
      - DAWN_ENABLE_VULKAN=OFF
      - DAWN_ENABLE_D3D12=OFF
      - DAWN_ENABLE_D3D11=OFF
      - DAWN_ENABLE_DESKTOP_GL=OFF
      - DAWN_ENABLE_OPENGLES=OFF
      - CMAKE_OSX_DEPLOYMENT_TARGET=11.0
      - CMAKE_OSX_ARCHITECTURES=arm64
      # Enable thin LTO for smaller/faster libwebgpu_dawn.a
      - CMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
      # ── Strip debug symbols from the static archive ──
      # Clang/GCC spelling, so it is set per-platform rather than globally. On
      # MSVC it would be doubly wrong: cl.exe reads -g0 as an unknown /g0 and
      # ignores it, AND assigning CMAKE_CXX_FLAGS wholesale discards MSVC's
      # default /EHsc /GR (exceptions and RTTI). Release already omits debug
      # info on MSVC, so Windows needs nothing here.
      - CMAKE_CXX_FLAGS=-g0
      - CMAKE_C_FLAGS=-g0

    defines[platform:linux]:
      - DAWN_ENABLE_VULKAN=ON
      - DAWN_ENABLE_METAL=OFF
      - DAWN_ENABLE_D3D12=OFF
      - DAWN_ENABLE_D3D11=OFF
      - DAWN_ENABLE_DESKTOP_GL=OFF
      - DAWN_ENABLE_OPENGLES=OFF
      - DAWN_USE_X11=ON
      - DAWN_USE_WAYLAND=OFF
      - DAWN_SUPPORTS_CXX_MODULES=OFF
      # ── Strip debug symbols from the static archive ── (see macos note)
      - CMAKE_CXX_FLAGS=-g0
      - CMAKE_C_FLAGS=-g0

    defines[platform:windows]:
      - DAWN_ENABLE_D3D12=ON
      - DAWN_ENABLE_D3D11=OFF
      - DAWN_ENABLE_METAL=OFF
      - DAWN_ENABLE_VULKAN=OFF
      - DAWN_ENABLE_DESKTOP_GL=OFF
      - DAWN_ENABLE_OPENGLES=OFF
      - DAWN_USE_BUILT_DXC=OFF

distribution:
  dawn:
    kind: archive
    format: zip
    include:
      - ${externalBuild:${name}}/install/lib
      - ${externalBuild:${name}}/install/include
      - ${external:${name}}/LICENSE
