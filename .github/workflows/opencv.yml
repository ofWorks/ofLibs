name: opencv
# bump 2026-06-28: re-trigger at HEAD to pick up zlib-ng utils fix

on:
  push:
    paths:
      - .github/workflows/opencv.yml
      - opencv/**

jobs:
  ci:
    permissions:
      contents: write

    uses: ./.github/workflows/_build.yml
    with: { lib: opencv, version: v1.0 }
    secrets: inherit
