name: rplidar

on:
  push:
    paths:
      - rplidar/**
      - .github/workflows/rplidar.yml

jobs:
  ci:
    permissions:
      contents: write

    uses: ./.github/workflows/_build.yml
    with:
      lib: rplidar
      version: v1.0
      # macOS-only for now: the build script compiles the macOS arch of the
      # Slamtec SDK (dimitre/rplidar_sdk branch braid).
      platforms: >-
        [
          {"platform":"macos","os":"macos-26","toolchain":"apple-llvm"}
        ]
    secrets: inherit
