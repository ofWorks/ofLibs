name: dawn

# Dawn (WebGPU) is built only for the desktop platforms openFrameworks targets
# with a native backend: macOS (Metal), Linux (Vulkan), Windows (D3D11/12).
# Web uses the browser's WebGPU (emdawnwebgpu) and rpi cross-compile is not set
# up, so we pass a restricted `platforms` set to the shared _build.yml.

on:
  push:
    paths:
      - dawn/**
      - .github/workflows/dawn.yml

jobs:
  ci:
    permissions:
      contents: write
    uses: ./.github/workflows/_build.yml
    with: {
        lib: dawn,
        # separate tag so Dawn is not bundled into the v1.0 release
        version: v1.0,
        # Vulkan/X11 surface support on Linux (Vulkan loader is fetched by Dawn)
        linux_apt: libx11-dev libx11-xcb-dev libxcb1-dev pkg-config,
        # Dawn/Tint require Clang >= 16 (C++20 P0634 "Down with typename");
        # ubuntu-22.04 ships Clang 14, so Linux uses ubuntu-24.04 (Clang 18).
        # Note: this links against glibc 2.39, so the .a needs a reasonably
        # recent Linux at runtime.
        #
        # Windows is pinned to windows-2022 (MSVC 14.4x) for the same reason
        # Linux is not on the newest image: a prebuilt lib must be built with
        # the OLDEST toolset it has to link into, never the newest. MSVC's STL
        # keeps its vectorized helpers (__std_rotate, __std_min_element_8u, ...)
        # in the separately-compiled libcpmt.lib and only ever ADDS to that set,
        # so old-lib-into-new-consumer is fine and new-lib-into-old-consumer is
        # an unresolved-externals wall. windows-latest silently became a VS 2026
        # image (MSVC 14.51) and broke exactly that way against a consumer on
        # 14.44. Keep this in step with Braid's CI pin (.github/workflows/ci.yml)
        # and with whatever the render nodes actually have installed.
        platforms: '[
          {"platform":"linux64","os":"ubuntu-24.04","toolchain":"llvm"},
          {"platform":"macos","os":"macos-26","toolchain":"apple-llvm"},
          {"platform":"vs","os":"windows-2022","toolchain":"vs-stable"}
          ]',
      }
    secrets: inherit
